services:
  postgres:
    # ParadeDB bundles pg_search (BM25) + pgvector (ADR 014). Pinned to a
    # PostgreSQL 16 tag so the data-dir layout matches the volume mount below
    # (`latest` tracks PG18, which changed the mount point). The pg_search API
    # is version-sensitive, so keep this tag and search SQL in sync.
    image: paradedb/paradedb:0.24.1-pg16
    environment:
      POSTGRES_DB: genai_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:1.9
    platform: linux/amd64
    profiles:
      - tei-docker
    command:
      - "--model-id"
      - "Qwen/Qwen3-Embedding-0.6B"
    ports:
      - "8080:80"
    volumes:
      - tei_data:/data
    shm_size: "1g"

volumes:
  postgres_data:
  tei_data:
